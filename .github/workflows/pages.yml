# 예측 흐름 대시보드 → GitHub Pages 정적 배포.
# 커밋된 불변 파일(forecasts·ledger·ml_history·registry)에서 DB를 재구축해 빌드 —
# LLM 호출 없음, 시크릿 0, 읽기 전용. 데이터는 이미 공개 repo에 존재하는 예측 기록.
name: pages
on:
  push:
    branches: [main]
    paths:                     # 데이터·엔진 변경 시에만 재배포
      - "forecasts/**"
      - "calibration/**"
      - "data/**"
      - "questions/**"
      - "src/ai_fc/dashboard*"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "30 1 * * 6"       # 주간 리프레시 커밋 이후 (토 KST 오전)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps (시크릿 불필요 — import 경로용)
        run: pip install anthropic typer pydantic pyyaml python-frontmatter numpy scipy
      - name: 파생 인덱스 재구축 (불변 파일 → SQLite)
        run: cd src && python -m ai_fc sync --rebuild
      - name: 대시보드 정적 빌드 (읽기 전용, API 키 불필요)
        run: cd src && python -m ai_fc dashboard --pages-out ../_site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
