<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jin's Investing Prediction Solution</title>
<!--DATA-->
<style>
:root{
  --bg:#eaedf1; --surface:#ffffff; --surface2:#f6f8fa; --panelh:#f3f5f8;
  --border:#e0e4e9; --border2:#ccd2da; --hair:#eceff3; --line:#e0e4e9;
  --ink:#0f1622; --ink2:#525c6a; --ink3:#8892a0; --ink4:#aab2bd;
  --dark:#0e1723; --dark2:#16212f; --darkln:#263242; --darktx:#93a0af;
  --accent:#1d5fd0; --accent2:#1750b8; --accentlt:#5b8ef0;
  --pos:#0f8a4c; --neg:#cf2f2a; --warn:#9a6600;
  --s1:#1d5fd0; --s2:#0f8a4c; --s3:#cf2f2a; --analog:#98a3b1;
  --radius:5px;
  --sans:system-ui,-apple-system,'Segoe UI','Helvetica Neue','Malgun Gothic',Roboto,Arial,sans-serif;
  --mono:'SF Mono','Segoe UI Mono','Roboto Mono','Consolas',ui-monospace,monospace;
  --serif:var(--sans);
  --shadow:0 1px 2px rgba(15,22,34,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.45;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.wrap{max-width:1240px;margin:0 auto;padding:0 22px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.muted{color:var(--ink3)} .small{font-size:11px}

/* 커맨드바 — 다크 (월가 터미널 앵커). 전폭 다크 + 흰색 데이터 바디 */
.appbar{background:var(--dark);border-bottom:1px solid #050c14}
.appbar-in{max-width:1240px;margin:0 auto;padding:0 22px;height:52px;display:flex;align-items:center;
  justify-content:space-between;gap:18px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.mk{width:19px;height:19px;border-radius:3px;background:linear-gradient(135deg,var(--accentlt),var(--accent));
  display:flex;align-items:center;justify-content:center;flex:none}
.mk::after{content:"";width:7px;height:7px;background:#fff;border-radius:1.5px;transform:rotate(45deg)}
.wm{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.01em;white-space:nowrap}
.wm-sub{font-size:9px;font-weight:700;letter-spacing:.2em;color:var(--darktx);text-transform:uppercase;
  border-left:1px solid var(--darkln);padding-left:11px;white-space:nowrap}
.appbar-util{display:flex;align-items:center;gap:13px;font-family:var(--mono);font-size:11px;color:var(--darktx);white-space:nowrap}
.appbar-util .phase{color:#c8d2dd;border:1px solid var(--darkln);border-radius:3px;padding:2.5px 8px;font-size:9.5px;
  font-weight:700;letter-spacing:.07em;background:var(--dark2)}
.appbar-util .live{display:inline-flex;align-items:center;gap:6px}
.appbar-util .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 0 2px rgba(15,138,76,.25)}
@media(max-width:720px){.wm-sub{display:none}}
@media(max-width:560px){.appbar-util #asof{display:none}.appbar-in{padding:0 14px}.wrap{padding:0 14px}}

/* 시장 지표 바 (인덱스 라인) */
.mktstrip{display:flex;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-top:16px}
.mkt{display:flex;flex-direction:column;gap:2px;padding:10px 16px;border-right:1px solid var(--hair);flex:1;min-width:128px}
.mkt:last-child{border-right:none}
.mkt .k{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3)}
.mkt .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.mkt .v small{font-family:var(--sans);font-size:10.5px;font-weight:600;color:var(--ink3);margin-left:6px}
.mkt.lead{flex:1.35;background:var(--surface2)}
.mkt .v.up{color:var(--pos)} .mkt .v.up small{color:var(--pos)}
.mkt .v.down{color:var(--neg)} .mkt .v.down small{color:var(--neg)}

/* 내비게이션 */
nav{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-top:18px}
nav a{padding:10px 16px 11px;font-size:12.5px;color:var(--ink2);border-bottom:2px solid transparent;cursor:pointer;
  font-weight:500;letter-spacing:.005em;transition:color .12s,border-color .12s;margin-bottom:-1px}
nav a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
nav a:hover{color:var(--ink)}

/* 레이아웃 */
.section-h{font-size:17px;color:var(--ink);margin:24px 0 2px;font-weight:700;letter-spacing:-.01em}
.section-sub{font-size:12px;color:var(--ink3);margin-bottom:13px}
.grid{display:grid;gap:11px}
.g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:820px){.g4,.g3,.g2{grid-template-columns:1fr 1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow)}
.card-h{font-size:9.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.11em;font-weight:700;margin-bottom:10px}
.kpi{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.05;letter-spacing:-.02em}
.kpi .u{font-size:12px;color:var(--ink3);font-weight:500;margin-left:5px;font-family:var(--sans);letter-spacing:0}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:7px;line-height:1.5}

/* 표 — 조밀·하드라인 (스프레드시트형) */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--ink3);padding:7px 10px;font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;border-bottom:1px solid var(--border2);background:var(--panelh);white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:8px 10px;border-bottom:1px solid var(--hair);color:var(--ink)}
tbody tr:last-child td{border-bottom:none}
tr.click{cursor:pointer} tr.click:hover td{background:var(--surface2)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* 요소 */
.progress{height:5px;background:var(--hair);border-radius:2px;overflow:hidden;margin-top:9px}
.progress > i{display:block;height:100%;background:var(--accent);border-radius:2px}
.chip{display:inline-block;padding:2px 8px;margin:2px 4px 2px 0;border-radius:3px;background:var(--surface2);
  border:1px solid var(--border);font-size:10.5px;color:var(--ink2);letter-spacing:.01em}
.tag-pos{color:var(--pos)} .tag-neg{color:var(--neg)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
.legend{display:flex;gap:17px;flex-wrap:wrap;font-size:11.5px;color:var(--ink2);align-items:center;margin-bottom:2px}
.pill{display:inline-block;padding:3.5px 10px;border:1px solid var(--border);border-radius:3px;font-size:11px;
  color:var(--ink2);background:var(--surface2);margin:3px 5px 0 0;letter-spacing:.01em}
.legend b{display:inline-block;width:15px;height:2.5px;border-radius:2px;vertical-align:middle;margin-right:7px}
.filterbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
select,input[type=text],input[type=date]{background:var(--surface);border:1px solid var(--border2);color:var(--ink);
  border-radius:4px;padding:7px 10px;font-size:12.5px;font-family:inherit}
select:focus,input:focus{outline:2px solid rgba(29,95,208,.2);outline-offset:0;border-color:var(--accent)}
.reasoning{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;
  font-size:12.5px;white-space:pre-wrap;line-height:1.72;color:var(--ink2);max-height:540px;overflow:auto}
.rounds{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.rnd{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:9px 14px;cursor:pointer;text-align:center;transition:border-color .12s,box-shadow .12s}
.rnd.sel{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.rnd .p{font-family:var(--mono);font-size:19px;font-weight:600;color:var(--accent)}
.scroll{overflow-x:auto}
.tip{position:fixed;pointer-events:none;background:var(--dark);border:1px solid var(--darkln);border-radius:4px;
  padding:8px 11px;font-size:11.5px;display:none;z-index:20;line-height:1.65;color:#e6ebf0;box-shadow:0 8px 24px rgba(15,22,34,.28)}
.tip b{color:#fff}
.back{display:inline-block;font-size:12px;color:var(--accent);cursor:pointer;margin-bottom:4px;font-weight:500}
.back:hover{text-decoration:underline}
.loading{text-align:center;color:var(--ink3);padding:70px;font-size:14px}
footer{border-top:1px solid var(--border);margin-top:42px;padding:20px 0 40px;font-size:11px;color:var(--ink3);line-height:1.8}
svg text{font-family:var(--sans)}
</style>
</head>
<body>
<div class="appbar">
  <div class="appbar-in">
    <div class="brand">
      <span class="mk"></span>
      <span class="wm">Jin's Investing</span>
      <span class="wm-sub">Prediction Solution</span>
    </div>
    <div class="appbar-util">
      <span class="phase" id="phase">—</span>
      <span class="live">LIVE</span>
      <span id="asof"></span>
    </div>
  </div>
</div>
<div class="wrap">
  <div class="mktstrip" id="mktstrip"></div>
  <nav id="nav">
    <a data-v="overview">요약</a>
    <a data-v="flow">시장 전망</a>
    <a data-v="ask">기간 조회</a>
    <a data-v="questions">예측 목록</a>
    <a data-v="asof">시점 조회</a>
    <a data-v="track">적중 이력</a>
  </nav>
  <div id="app"><div class="loading">불러오는 중…</div></div>
  <footer>
    본 자료는 예측 모델의 산출물로 정보 제공을 목적으로 하며, 투자 자문이나 매매 권유가 아닙니다.
    과거 적중 기록은 미래 성과를 보장하지 않습니다.<br>
    <span class="muted">© Jin's Investing Prediction Solution · 확률 예측은 캘리브레이션으로 지속 검증됩니다.</span>
  </footer>
</div>
<div class="tip" id="tip"></div>

<script>
"use strict";
async function loadData(){
  if(window.__DATA__) return window.__DATA__;
  if(window.__DATA_URL__){ const r = await fetch(window.__DATA_URL__); return await r.json(); }
  return null;
}
let DATA=null;
const $=(s,r=document)=>r.querySelector(s);
const app=()=>document.getElementById('app');
const pct=v=>(v==null?'—':Math.round(v*100)+'%');
const p1=v=>(v==null?'—':v+'%');
const num=v=>(v==null?'—':Number(v).toLocaleString());
const esc=s=>(s==null?'':String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}

const VIEWS={overview:renderOverview,flow:renderFlow,ask:renderAsk,questions:renderQuestions,asof:renderAsof,track:renderTrack,q:renderDetail};
function route(){
  const h=(location.hash||'#overview').slice(1);const [v,arg]=h.split('/');
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.v===v));
  (VIEWS[v]||renderOverview)(arg);
  window.scrollTo(0,0);
}
window.addEventListener('hashchange',route);
document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>location.hash='#'+a.dataset.v));

// ── 요약 ──
function renderOverview(){
  const m=DATA.meta,g=DATA.calibration.gate;
  const target=50, prog=Math.min(100,(g.n_resolved||0)/target*100);
  app().innerHTML='';
  app().appendChild(el(`<div>
    <div class="grid g4">
      <div class="card"><div class="card-h">진행 중 예측</div><div class="kpi">${m.n_questions}<span class="u">개 질문</span></div>
        <div class="kpi-sub">기록된 예측 ${m.n_forecasts}회</div></div>
      <div class="card"><div class="card-h">결과 확정</div><div class="kpi">${g.n_resolved||0}<span class="u">건</span></div>
        <div class="kpi-sub">정확도 검증 표본</div></div>
      <div class="card"><div class="card-h">정확도 점수</div><div class="kpi">${g.brier!=null?Number(g.brier).toFixed(3):'—'}</div>
        <div class="kpi-sub">Brier · 0에 가까울수록 정확</div></div>
      <div class="card"><div class="card-h">이번 주 점검</div><div class="kpi">${(DATA.due||[]).length}<span class="u">건</span></div>
        <div class="kpi-sub">기한 도래·이벤트 트리거 재예측 대상</div></div>
    </div>
    <div class="grid g2" style="margin-top:14px">
      <div class="card"><div class="card-h">연말 시장 전망 · 나스닥</div>${scenarioBars()}</div>
      <div class="card"><div class="card-h">검증 진행</div>
        <div class="kpi" style="font-size:22px">${g.n_resolved||0} <span class="u">/ ${target} 목표</span></div>
        <div class="progress"><i style="width:${prog}%"></i></div>
        <div class="kpi-sub">예측이 실제 결과로 확정될 때마다 정확도가 검증됩니다. 목표 도달 시 신뢰구간이 공개 검증됩니다.</div>
      </div>
    </div>
  </div>`));
  const up=upcoming();
  if(up.length){
    app().appendChild(el(`<div class="card" style="margin-top:14px"><div class="card-h">다가오는 일정</div>
      <div class="scroll"><table><tbody>${up.map(u=>`<tr class="click" data-q="${esc(u.id)}">
        <td>${esc(u.title)}</td><td class="r num muted small">${esc(u.deadline)}</td>
        <td class="r num" style="width:70px;color:var(--navy);font-weight:600">${p1(u.latest_prob)}</td></tr>`).join('')}</tbody></table></div></div>`))
      .querySelectorAll('tr.click').forEach(tr=>tr.onclick=()=>location.hash='#q/'+tr.dataset.q);
  }
}
function upcoming(){
  const today=DATA.meta.generated.slice(0,10);
  return DATA.questions.filter(q=>q.status==='active'&&q.deadline&&q.deadline>=today)
    .sort((a,b)=>a.deadline<b.deadline?-1:1).slice(0,6);
}
function scenarioBars(){
  const s=DATA.scenario.paths;
  return ['S1','S2','S3'].map(k=>{const p=s[k];
    return `<div style="display:flex;align-items:center;gap:12px;margin:9px 0">
      <b class="num" style="width:42px;font-family:var(--mono);font-size:15px;color:${p.color}">${p.prob}%</b>
      <span class="bar" style="height:8px;border-radius:4px;background:${p.color};width:${p.prob*2.0}px;display:inline-block"></span>
      <span class="small" style="color:var(--ink2)">${esc(p.label)} · 종점 ${num(p.end)}</span></div>`;
  }).join('')+`<div class="kpi-sub" style="margin-top:10px">현재 ${num(Math.round(DATA.scenario.anchor))} → 연말 시나리오별 전망. 확률 합계 100%.</div>`;
}

// ── 시장 전망 (흐름 차트) ──
function renderFlow(){
  const sc=DATA.scenario;
  app().innerHTML='';
  const legend=`<div class="legend">
    ${['S1','S2','S3'].map(k=>`<span><b style="background:${sc.paths[k].color}"></b>${esc(sc.paths[k].label)} ${sc.paths[k].prob}%</span>`).join('')}
    <span><b style="background:${sc.analog.color};height:2px"></b>과거 유사 사이클 (참조)</span></div>`;
  const w=el(`<div>
    <div class="section-h">연말 시장 전망</div>
    <div class="section-sub">나스닥 종합 · 현재 ${num(sc.anchor)} 기준 주간 시나리오 경로 (${sc.asof} → 12/31)</div>
    <div class="card">${legend}<div class="scroll"><div id="chart" style="min-width:1000px"></div></div>
      <div class="kpi-sub" style="margin-top:12px">경로는 대표 시나리오 예시입니다. 확률은 예측 모델 앙상블 산출값이며, 시간 구조는 계절성·주요 이벤트 일정에 근거합니다.</div>
    </div></div>`);
  app().appendChild(w);
  drawFlow($('#chart',w),sc);
  renderAnalogOverlay();
}
// ── 다중 시대 아날로그 오버레이 (context run — 참조 base rate, 예측 아님) ──
const ERA_META={ai:['AI 현재','#1d5fd0',2.4],dotcom:['닷컴 1996','#8892a0',1.4],
  japan1989:['일본 1989','#8a6d9b',1.2],niftyfifty1972:['니프티50 1972','#a3616f',1.2],
  crypto2021:['크립토 2021','#b0813f',1.2],biotech2015:['바이오 2015','#4f8a8b',1.2],
  dow1929:['다우 1929','#6b7280',1.2]};
function renderAnalogOverlay(){
  const ctx=DATA.analog_context;if(!ctx||!ctx.overlay)return;
  const o=ctx.overlay;const eras=Object.keys(ERA_META).filter(e=>o[e]&&o[e].length>1);
  if(eras.length<2)return;
  const legend=`<div class="legend">${eras.map(e=>`<span><b style="background:${ERA_META[e][1]};height:${e==='ai'?3:2}px"></b>${ERA_META[e][0]}</span>`).join('')}</div>`;
  const rg=ctx.regime||{},br=ctx.breadth||{},cc=ctx.concentration||{};
  const strip=[
    rg.recession_flag!=null?`NBER 침체 ${rg.recession_flag?'진행중':'아님'}`:null,
    br.pct_above_200dma!=null?`시장 폭(200일선 상회) ${br.pct_above_200dma}%`:null,
    cc.ratio_pctile!=null?`대형주 집중 ${cc.ratio_pctile}백분위`:null,
    ctx.perez_ai?`사이클 국면: ${esc(ctx.perez_ai.split(' — ')[0])} (추정)`:null
  ].filter(Boolean).map(s=>`<span class="pill">${s}</span>`).join(' ');
  const w=el(`<div><div class="card" style="margin-top:18px">
    <div class="card-h">과거 혁신 사이클 비교 · 시작월=100 (로그 스케일)</div>
    ${legend}<div class="scroll"><div id="ovchart" style="min-width:1000px"></div></div>
    <div style="margin-top:10px">${strip}</div>
    <div class="kpi-sub" style="margin-top:8px">각 사이클을 시작 시점 100으로 정규화한 참고 비교입니다. 과거 사이클은 예측이 아닌 참조이며, 시대 간 시장 구조 차이가 있습니다. 다우 1929는 월평균 지수 기준.</div>
  </div></div>`);
  app().appendChild(w);
  drawOverlay($('#ovchart',w),o,eras);
}
function drawOverlay(host,o,eras){
  const NS='http://www.w3.org/2000/svg';
  const W=1160,H=430,ML=58,MR=120,MT=26,MB=34,CAP=108;
  const PW=W-ML-MR,PH=H-MT-MB;
  const lg=Math.log10,Y0=lg(55),Y1=lg(2100);
  const X=m=>ML+PW*m/CAP,Y=v=>MT+PH*(1-(lg(v)-Y0)/(Y1-Y0));
  const svg=document.createElementNS(NS,'svg');svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');
  const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const tx=(x,y,s,ob={})=>{const e=mk('text',{x,y,fill:ob.fill||'#8b95a5','font-size':ob.fs||11,'text-anchor':ob.anc||'start','font-weight':ob.w||400});e.textContent=s;return e;};
  [100,200,400,800,1600].forEach(v=>{svg.appendChild(mk('line',{x1:ML,y1:Y(v),x2:ML+PW,y2:Y(v),stroke:v===100?'#dfe3e9':'#eef1f4','stroke-width':1}));
    svg.appendChild(tx(ML-8,Y(v)+4,String(v),{anc:'end',fill:'#a7b0bd'}));});

function drawHistory(host,hist,mlRuns,mktRuns){

  const NS='http://www.w3.org/2000/svg';const W=860,H=190,ML=38,MR=16,MT=14,MB=26,PW=W-ML-MR,PH=H-MT-MB;
  const pts=hist.map(h=>({t:(h.forecast_ts||'').slice(0,10),p:h.probability}));
  const ds=pts.map(p=>p.t).concat(mlRuns.map(m=>m.run_ts.slice(0,10)),mktRuns.map(m=>m.run_ts.slice(0,10)));
  const t0=ds.reduce((a,b)=>a<b?a:b),t1=ds.reduce((a,b)=>a>b?a:b);
  const toX=t=>ML+PW*((Date.parse(t)-Date.parse(t0))/Math.max(1,Date.parse(t1)-Date.parse(t0)));
  const Y=p=>MT+PH*(1-p/100);
  const svg=document.createElementNS(NS,'svg');svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');svg.style.maxWidth='640px';
  const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const tx=(x,y,s,o={})=>{const e=mk('text',{x,y,fill:o.fill||'#a7b0bd','font-size':o.fs||10,'text-anchor':o.anc||'start'});e.textContent=s;return e;};
  [0,25,50,75,100].forEach(v=>{svg.appendChild(mk('line',{x1:ML,y1:Y(v),x2:ML+PW,y2:Y(v),stroke:'#eef1f4'}));svg.appendChild(tx(ML-6,Y(v)+3,v+'%',{anc:'end'}));});
  mlRuns.forEach(m=>svg.appendChild(mk('circle',{cx:toX(m.run_ts.slice(0,10)),cy:Y(Math.round(m.prob*100)),r:3,fill:'#0f7a5a',opacity:.55})));
  mktRuns.forEach(m=>svg.appendChild(mk('circle',{cx:toX(m.run_ts.slice(0,10)),cy:Y(Math.round(m.prob*100)),r:3,fill:'#9a7b2e',opacity:.7})));

}

    <div class="scroll"><table><thead><tr><th>분야</th><th class="r">표본</th><th class="r">정확도 (Brier)</th></tr></thead>
    <tbody>${ds.map(r=>`<tr><td>${esc(r.domain)}</td><td class="r num muted">${r.n}</td>
      <td class="r num">${r.brier!=null?Number(r.brier).toFixed(3):'—'}</td></tr>`).join('')}</tbody></table></div></div>`));}
}

// ── 물어보기 (결정론 기간 질의 — LLM 미사용, 일별 그래프 중심) ──
function weekDate(label){const [m,d]=label.split('/').map(Number);return new Date(2026,m-1,d);}
function bizDates(s,e){const out=[];let d=new Date(s);while(d<=e){const w=d.getDay();if(w!==0&&w!==6)out.push(new Date(d));d.setDate(d.getDate()+1);}return out;}
function interpAt(vals,wdts,t){ // 주간 앵커 → 임의 날짜 선형 보간 (일별화)
  if(t<=wdts[0])return vals[0];
  for(let i=0;i<wdts.length-1;i++){if(t>=wdts[i]&&t<=wdts[i+1]){const f=(t-wdts[i])/(wdts[i+1]-wdts[i]);return vals[i]+f*(vals[i+1]-vals[i]);}}
  return vals[vals.length-1];
}
function drawDaily(host,sc,endIdx){
  const NS='http://www.w3.org/2000/svg';
  const wdts=sc.weeks.map(w=>weekDate(w));
  const dates=bizDates(wdts[0],wdts[endIdx]);
  const keys=['S1','S2','S3'];
  const ser={};keys.forEach(k=>ser[k]=dates.map(t=>interpAt(sc.paths[k].values,wdts,t)));
  const all=[].concat(...keys.map(k=>ser[k]));
  let ymin=Math.min(...all),ymax=Math.max(...all);const pad=(ymax-ymin)*0.08||100;ymin-=pad;ymax+=pad;
  const W=1000,H=350,ML=52,MR=118,MT=20,MB=32,PW=W-ML-MR,PH=H-MT-MB;
  const t0=+dates[0],t1=+dates[dates.length-1];
  const X=t=>ML+PW*((+t-t0)/Math.max(1,t1-t0)),Y=v=>MT+PH*(1-(v-ymin)/(ymax-ymin));
  const svg=document.createElementNS(NS,'svg');svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');
  const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const tx=(x,y,s,o={})=>{const e=mk('text',{x,y,fill:o.fill||'#8b95a5','font-size':o.fs||10.5,'text-anchor':o.anc||'start','font-weight':o.w||400});e.textContent=s;return e;};
  // y 그리드 (5분할)
  for(let g=0;g<=4;g++){const v=ymin+(ymax-ymin)*g/4;svg.appendChild(mk('line',{x1:ML,y1:Y(v),x2:ML+PW,y2:Y(v),stroke:'#eef1f4'}));
    svg.appendChild(tx(ML-8,Y(v)+4,(Math.round(v/10)*10).toLocaleString(),{anc:'end',fill:'#a7b0bd'}));}
  // 전고점 기준선 (범위 내일 때)
  if(sc.ath<=ymax&&sc.ath>=ymin){svg.appendChild(mk('line',{x1:ML,y1:Y(sc.ath),x2:ML+PW,y2:Y(sc.ath),stroke:'#c2c9d2','stroke-width':1,'stroke-dasharray':'5 4'}));
    svg.appendChild(tx(ML+PW+6,Y(sc.ath)+4,'전고점',{fill:'#8b95a5'}));}
  // 밴드 (상단 최대 ↔ 하단 최소 포락)
  const up=dates.map((t,i)=>Math.max(ser.S1[i],ser.S2[i],ser.S3[i]));
  const dn=dates.map((t,i)=>Math.min(ser.S1[i],ser.S2[i],ser.S3[i]));
  let dband='';up.forEach((v,i)=>dband+=(i?'L':'M')+X(dates[i])+','+Y(v)+' ');
  for(let i=dn.length-1;i>=0;i--)dband+='L'+X(dates[i])+','+Y(dn[i])+' ';
  svg.appendChild(mk('path',{d:dband+'Z',fill:'#1f5f9e',opacity:.07}));
  // 시나리오 3선
  keys.forEach(k=>{const p=sc.paths[k];let d='';ser[k].forEach((v,i)=>d+=(i?'L':'M')+X(dates[i])+','+Y(v)+' ');
    svg.appendChild(mk('path',{d,fill:'none',stroke:p.color,'stroke-width':k==='S1'?2.4:1.6,'stroke-linejoin':'round',opacity:k==='S1'?1:.85}));
    const ev=ser[k][ser[k].length-1];
    svg.appendChild(mk('circle',{cx:X(dates[dates.length-1]),cy:Y(ev),r:3.4,fill:p.color,stroke:'#fff','stroke-width':1.5}));
    svg.appendChild(tx(X(dates[dates.length-1])+8,Y(ev)+4,`${num(Math.round(ev))} ${p.prob}%`,{fill:p.color,fs:11,w:600}));});
  // 시작점(현재)
  svg.appendChild(mk('circle',{cx:X(dates[0]),cy:Y(ser.S1[0]),r:4,fill:'#0f1b2d',stroke:'#fff','stroke-width':1.5}));
  svg.appendChild(tx(X(dates[0])-4,Y(ser.S1[0])-9,num(Math.round(sc.anchor)),{fill:'#0f1b2d',w:600,anc:'start'}));
  // x축 월 눈금
  let lastM=-1;dates.forEach(t=>{const m=t.getMonth();if(m!==lastM){lastM=m;
    svg.appendChild(mk('line',{x1:X(t),y1:MT,x2:X(t),y2:MT+PH,stroke:'#f1f3f6'}));
    svg.appendChild(tx(X(t),MT+PH+16,(m+1)+'월',{anc:'middle',fs:10,fill:'#8b95a5'}));}});
  // 호버
  const xh=mk('line',{stroke:'#b7bfca','stroke-width':1,opacity:0});svg.appendChild(xh);
  const ov=mk('rect',{x:ML,y:MT,width:PW,height:PH,fill:'transparent'});svg.appendChild(ov);
  const tip=document.getElementById('tip');
  ov.addEventListener('mousemove',e=>{const r=svg.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width);
    let bi=0,bd=1e15;dates.forEach((t,i)=>{const dd=Math.abs(X(t)-mx);if(dd<bd){bd=dd;bi=i;}});
    xh.setAttribute('x1',X(dates[bi]));xh.setAttribute('x2',X(dates[bi]));xh.setAttribute('y1',MT);xh.setAttribute('y2',MT+PH);xh.setAttribute('opacity',.4);
    tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';
    const dd=dates[bi];
    tip.innerHTML=`<b>${(dd.getMonth()+1)}/${dd.getDate()}</b><br>
      <span style="color:${sc.paths.S1.color}">기본 ${num(Math.round(ser.S1[bi]))}</span><br>
      <span style="color:${sc.paths.S2.color}">중립 ${num(Math.round(ser.S2[bi]))}</span><br>
      <span style="color:${sc.paths.S3.color}">조정 ${num(Math.round(ser.S3[bi]))}</span>`;});
  ov.addEventListener('mouseleave',()=>{tip.style.display='none';xh.setAttribute('opacity',0);});
  host.appendChild(svg);
}
function renderAsk(){
  const sc=DATA.scenario;const now=DATA.meta.generated.slice(0,10);
  app().innerHTML='';
  app().appendChild(el(`<div class="section-h">기간 주가 예측 · 나스닥</div>
    <div class="section-sub">현 기준(${now}) 기간을 고르면 일별 전망 그래프로 보여드립니다</div>`));
  const presets=[['8월말',7],['9월말',11],['10월말',16],['11월말',20],['연말 12/31',25]];
  const bar=el(`<div class="filterbar">
    ${presets.map(([l,i])=>`<span class="chip ask-p" data-i="${i}" style="cursor:pointer;padding:8px 15px;font-size:12.5px">${l}</span>`).join('')}
    <span class="small muted">또는 날짜:</span><input type="date" id="ad" min="2026-07-14" max="2026-12-31" value="2026-12-31">
  </div>`);
  const out=el('<div id="ans"></div>');
  app().appendChild(bar);app().appendChild(out);
  const answer=i=>{
    const wk=sc.weeks[i],anchor=sc.anchor,lv=k=>sc.paths[k].values[i];
    const vals=['S1','S2','S3'].map(lv),lo=Math.min(...vals),hi=Math.max(...vals);
    const sign=v=>{const x=(v/anchor-1)*100;return (x>=0?'+':'')+x.toFixed(1)+'%';};
    const band=(i===25)?` · 모델 앙상블 중앙값 <b class="num">${num(sc.bands.eoy_median)}</b>`:'';
    const wd=weekDate(wk);
    const inWin=DATA.questions.filter(q=>q.deadline&&q.deadline>=now&&new Date(q.deadline)<=wd).sort((a,b)=>a.deadline<b.deadline?-1:1);
    const evs=sc.events.filter(([xi])=>xi<=i+0.5&&xi>=0.5).map(([,l])=>l);
    out.innerHTML=`
    <div class="card"><div class="card-h">현재 → ${wk} · 일별 전망 그래프</div>
      <div class="legend" style="margin-bottom:6px">
        <span><b style="background:${sc.paths.S1.color}"></b>기본 ${sc.paths.S1.prob}%</span>
        <span><b style="background:${sc.paths.S2.color}"></b>중립 ${sc.paths.S2.prob}%</span>
        <span><b style="background:${sc.paths.S3.color}"></b>조정 ${sc.paths.S3.prob}%</span></div>
      <div class="scroll"><div id="dchart" style="min-width:640px"></div></div>
      <div class="kpi-sub" style="margin-top:8px">${wk} 예상 범위 <b class="num">${num(lo)}–${num(hi)}</b> · 현재 대비 기본 ${sign(lv('S1'))} / 조정 ${sign(lv('S3'))}${band}</div>
    </div>
    ${evs.length?`<div class="card" style="margin-top:14px"><div class="card-h">이 기간 주요 일정</div>
      <div>${evs.map(e=>`<span class="chip">${esc(e)}</span>`).join('')}</div></div>`:''}
    ${inWin.length?`<div class="card" style="margin-top:14px"><div class="card-h">이 기간 확정 예정 예측 (${inWin.length})</div>
      <div class="scroll"><table><tbody>${inWin.map(q=>`<tr class="click" data-q="${esc(q.id)}">
        <td>${esc(q.title)}</td><td class="r num muted small">${esc(q.deadline)}</td>
        <td class="r num" style="width:70px;color:var(--navy);font-weight:600">${p1(q.latest_prob)}</td></tr>`).join('')}</tbody></table></div></div>`:''}
    <div class="kpi-sub" style="margin-top:14px;text-align:center">참고용 예측이며 투자 자문이 아닙니다. 경로는 시나리오별 대표값(확률 가중 평균 아님).</div>`;
    drawDaily($('#dchart',out),sc,i);
    out.querySelectorAll('tr.click').forEach(tr=>tr.onclick=()=>location.hash='#q/'+tr.dataset.q);
    bar.querySelectorAll('.ask-p').forEach(c=>{const on=+c.dataset.i===i;c.style.borderColor=on?'var(--navy)':'';c.style.color=on?'var(--navy)':'';c.style.fontWeight=on?'600':'400';});
  };
  bar.querySelectorAll('.ask-p').forEach(c=>c.onclick=()=>{$('#ad',bar).value='';answer(+c.dataset.i);});
  $('#ad',bar).onchange=e=>{const t=new Date(e.target.value);let bi=0,bd=1e15;
    sc.weeks.forEach((w,j)=>{const dd=Math.abs(weekDate(w)-t);if(dd<bd){bd=dd;bi=j;}});answer(bi);};
  answer(25);
}

// ── 시장 스트립 (헤더 하단 지표 라인) ──
function renderHeaderStrip(){
  const sc=DATA.scenario||{},ctx=DATA.analog_context||{},rg=ctx.regime||{},br=ctx.breadth||{};
  const anchor=sc.anchor,ath=sc.ath,corr=sc.corr10;
  const items=[];
  if(anchor!=null){
    const vsAth=ath?((anchor/ath-1)*100):null;
    items.push({k:'나스닥 종합',v:num(Math.round(anchor)),
      sub:vsAth!=null?`전고점 대비 ${vsAth>=0?'+':''}${vsAth.toFixed(1)}%`:'',lead:true,
      cls:vsAth!=null?(vsAth>=0?'up':'down'):''});
  }
  if(ath!=null)items.push({k:'전고점',v:num(Math.round(ath)),sub:'ATH'});
  if(corr!=null)items.push({k:'−10% 지지선',v:num(Math.round(corr)),sub:'조정 기준'});
  if(br.pct_above_200dma!=null)items.push({k:'시장 폭',v:br.pct_above_200dma+'%',sub:'200일선 상회'});
  if(rg.recession_flag!=null)items.push({k:'경기 국면',v:rg.recession_flag?'침체':'확장',
    sub:'NBER 기준',cls:rg.recession_flag?'down':'up'});
  else if(rg.hy_spread_pct!=null)items.push({k:'신용 스프레드',v:rg.hy_spread_pct.toFixed(2)+'%',sub:'HY OAS'});
  const strip=document.getElementById('mktstrip');
  if(!items.length){strip.style.display='none';return;}
  strip.innerHTML=items.map(it=>`<div class="mkt${it.lead?' lead':''}">
    <span class="k">${esc(it.k)}</span>
    <span class="v ${it.cls||''}">${esc(it.v)}${it.sub?`<small>${esc(it.sub)}</small>`:''}</span>
  </div>`).join('');
}

// ── 부트 ──
(async function(){
  DATA=await loadData();
  if(!DATA){app().innerHTML='<div class="loading">데이터를 불러오지 못했습니다.</div>';return;}
  document.getElementById('asof').textContent='갱신 '+DATA.meta.generated.replace('T',' ').slice(0,16)+' KST';
  const ph=document.getElementById('phase');if(ph&&DATA.meta.phase)ph.textContent=DATA.meta.phase+' 검증단계';
  renderHeaderStrip();
  route();
})();
